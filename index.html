<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            /* PURPLE → WHITE GRADIENT */
            background: linear-gradient(to right, #c4b5fd, #ffffff);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 5px;
            justify-content: center;
            margin-top: 20px;
        }

        .cell {
            width: 100px;
            height: 100px;
            font-size: 30px;
            cursor: pointer;
            background-color: white;
        }

        button {
            padding: 10px;
            cursor: pointer;
            font-size: 16px;
        }

        /* MOVE RESTART BUTTON DOWN */
        .restart-btn {
            margin-top: 30px;
        }
    </style>
</head>
<body>

<h1>Tic Tac Toe</h1>
<h2 id="status">Player X's turn</h2>

<div class="board">
    <button class="cell" onclick="play(this, 0)"></button>
    <button class="cell" onclick="play(this, 1)"></button>
    <button class="cell" onclick="play(this, 2)"></button>
    <button class="cell" onclick="play(this, 3)"></button>
    <button class="cell" onclick="play(this, 4)"></button>
    <button class="cell" onclick="play(this, 5)"></button>
    <button class="cell" onclick="play(this, 6)"></button>
    <button class="cell" onclick="play(this, 7)"></button>
    <button class="cell" onclick="play(this, 8)"></button>
</div>

<!-- Restart Button -->
<button class="restart-btn" onclick="restartGame()">Restart Game</button>

<script>
let board = ["", "", "", "", "", "", "", "", ""];
let player = "X";
let gameOver = false;

function play(cell, i) {
    if (board[i] !== "" || gameOver) return;

    board[i] = player;
    cell.innerText = player;

    cell.style.color = (player === "X") ? "blue" : "red";

    if (winner()) {
        document.getElementById("status").innerText = player + " wins!";
        gameOver = true;
        return;
    }

    if (!board.includes("")) {
        document.getElementById("status").innerText = "It's a draw!";
        gameOver = true;
        return;
    }

    player = (player === "X") ? "O" : "X";
    document.getElementById("status").innerText = "Player " + player + "'s turn";
}

function winner() {
    const w = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
    ];

    for (let i = 0; i < w.length; i++) {
        let a = w[i][0];
        let b = w[i][1];
        let c = w[i][2];

        if (board[a] !== "" &&
            board[a] === board[b] &&
            board[b] === board[c]) {
            return true;
        }
    }
    return false;
}

function restartGame() {
    board = ["", "", "", "", "", "", "", "", ""];
    player = "X";
    gameOver = false;

    document.getElementById("status").innerText = "Player X's turn";

    let cells = document.querySelectorAll(".cell");
    cells.forEach(cell => {
        cell.innerText = "";
        cell.style.color = "";
    });
}
</script>

</body>
</html>
